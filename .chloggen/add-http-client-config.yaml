subtext: |
  Exposes HTTP client configuration options including timeout, headers,
  TLS settings, compression, and proxy settings through the confighttp.ClientConfig
  struct in the OTLP HTTP exporter. This aligns the OTLP HTTP exporter configuration
  with other HTTP-based exporters in the collector.
